<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoramento - Padrões de Software</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center mb-5">
            <h1 class="display-4">Sistema de Monitoramento</h1>
            <p class="lead">Implementação com Padrões Singleton e Factory Method</p>
        </header>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title">Configuração do Provedor</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="providerSelect" class="form-label">Selecione o Provedor de Nuvem:</label>
                            <select class="form-select" id="providerSelect">
                                <option value="aws">Amazon Web Services (AWS)</option>
                                <option value="azure">Microsoft Azure</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="criarRecursos()">Criar Recursos</button>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title">Gerenciador de Logs</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success mb-3" onclick="registrarEvento()">Registrar Evento</button>
                        <button class="btn btn-warning mb-3" onclick="limparLogs()">Limpar Logs</button>
                        <div class="form-group">
                            <label for="eventMessage" class="form-label">Mensagem do Evento:</label>
                            <input type="text" class="form-control" id="eventMessage" placeholder="Digite uma mensagem...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Logs do Sistema</h5>
                        <small class="text-muted">Últimos eventos registrados</small>
                    </div>
                    <div class="card-body">
                        <div id="logContainer" class="log-container">
                            <div class="text-muted">Nenhum log registrado ainda...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Recursos Criados</h5>
                    </div>
                    <div class="card-body">
                        <div id="recursosContainer">
                            <div class="text-muted">Nenhum recurso criado ainda...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sistema-java.js"></script>
</body>
</html>
